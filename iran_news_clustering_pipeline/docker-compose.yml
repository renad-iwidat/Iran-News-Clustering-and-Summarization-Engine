version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: iran_news_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - OPENAI_API_KEY_IRAN_NEWS_TRANSLATION_HEBREW_ARABIC=${OPENAI_API_KEY_IRAN_NEWS_TRANSLATION_HEBREW_ARABIC}
      - OPENAI_API_KEY_IRAN_NEWS_CLUSTERING_ANALYSIS=${OPENAI_API_KEY_IRAN_NEWS_CLUSTERING_ANALYSIS}
      - OPENAI_API_KEY_IRAN_NEWS_REPORT_SUMMARIZATION=${OPENAI_API_KEY_IRAN_NEWS_REPORT_SUMMARIZATION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Scheduler Service
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: iran_news_scheduler
    environment:
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - OPENAI_API_KEY_IRAN_NEWS_TRANSLATION_HEBREW_ARABIC=${OPENAI_API_KEY_IRAN_NEWS_TRANSLATION_HEBREW_ARABIC}
      - OPENAI_API_KEY_IRAN_NEWS_CLUSTERING_ANALYSIS=${OPENAI_API_KEY_IRAN_NEWS_CLUSTERING_ANALYSIS}
      - OPENAI_API_KEY_IRAN_NEWS_REPORT_SUMMARIZATION=${OPENAI_API_KEY_IRAN_NEWS_REPORT_SUMMARIZATION}
    restart: unless-stopped
    depends_on:
      - api
